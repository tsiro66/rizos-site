media:
  input: src/assets
  output: /src/assets

components:
  locale-nav:
    type: object
    label: Navigation
    fields:
      - name: brand
        type: string
        label: Brand Name
        required: true
      - name: about
        type: string
        label: About Link
        required: true
      - name: products
        type: string
        label: Products Link
        required: true
      - name: factory
        type: string
        label: Facilities Link
        required: true
      - name: contact
        type: string
        label: Contact Link
        required: true

  locale-footer:
    type: object
    label: Footer
    fields:
      - name: description
        type: text
        label: Description
        required: true
      - name: navTitle
        type: string
        label: Navigation Title
        required: true
      - name: contactTitle
        type: string
        label: Contact Title
        required: true
      - name: about
        type: string
        label: About Link
        required: true
      - name: products
        type: string
        label: Products Link
        required: true
      - name: factory
        type: string
        label: Facilities Link
        required: true
      - name: contact
        type: string
        label: Contact Link
        required: true
      - name: email
        type: string
        label: Email
        required: true
      - name: phone
        type: string
        label: Phone
        required: true
      - name: country
        type: string
        label: Country
        required: true
      - name: copyright
        type: string
        label: Copyright Text
        description: Use {year} as a placeholder for the current year
        required: true
      - name: madeIn
        type: string
        label: Made In Text
        required: true

  hero-section:
    type: object
    label: Hero Section
    fields:
      - name: label
        type: string
        label: Label
      - name: title
        type: string
        label: Title
        required: true
      - name: subtitle
        type: text
        label: Subtitle
        required: true

  cta-section:
    type: object
    label: Call to Action
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: subtitle
        type: text
        label: Subtitle
      - name: btn
        type: string
        label: Button Text
        required: true

  cta-section-two-btns:
    type: object
    label: Call to Action
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: subtitle
        type: text
        label: Subtitle
      - name: btn1
        type: string
        label: Primary Button Text
        required: true
      - name: btn2
        type: string
        label: Secondary Button Text
        required: true

  highlight-item:
    type: object
    label: Highlight
    fields:
      - name: number
        type: string
        label: Number
        required: true
      - name: label
        type: string
        label: Label
        required: true

  value-card:
    type: object
    label: Value Card
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: description
        type: text
        label: Description
        required: true

  feature-item:
    type: object
    label: Feature
    fields:
      - name: title
        type: string
        label: Title
        required: true
      - name: description
        type: text
        label: Description
        required: true

  timeline-item:
    type: object
    label: Timeline Entry
    fields:
      - name: year
        type: string
        label: Year Abbreviation
        required: true
      - name: title
        type: string
        label: Title
        required: true
      - name: description
        type: text
        label: Description
        required: true

  team-member:
    type: object
    label: Team Member
    fields:
      - name: name
        type: string
        label: Name
        required: true
      - name: role
        type: string
        label: Role
        required: true

